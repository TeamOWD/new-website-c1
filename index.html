<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comfort One - New Website</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0d;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    .label {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      margin-bottom: 1.5rem;
    }

    .divider {
      width: 48px;
      height: 2px;
      background: #fff;
      margin: 0 auto 1.5rem;
      opacity: 0.3;
    }

    p {
      font-size: 1rem;
      color: #888;
      max-width: 320px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="label">Comfort One</div>
    <h1>Sitio en<br>construcción</h1>
    <div class="divider"></div>
    <p>Estamos trabajando en algo nuevo. Vuelve pronto.</p>
  </div>
</body>
</html>
